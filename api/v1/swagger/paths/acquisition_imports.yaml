---
/acquisitionimports:
  get:
    x-mojo-to: AcquisitionImports#list
    operationId: lmscloudListAcquisitionImports
    tags:
      - acquisitionimports
    summary: "Eintraege aus acquisition_import auflisten"
    produces:
      - application/json
    parameters:
      - name: _page
        in: query
        required: false
        type: integer
      - name: _per_page
        in: query
        required: false
        type: integer
      - name: q
        in: query
        required: false
        type: string
      - name: _order_by
        in: query
        required: false
        type: string
      - name: _distinct
        in: query
        required: false
        type: string
        description: "Gibt distinct-Werte fuer die angegebene Spalte zurueck (Dropdown-Befuellung)"
      - name: rec_type
        in: query
        required: false
        type: string
      - name: processingstate
        in: query
        required: false
        type: string
      - name: vendor_id
        in: query
        required: false
        type: string
      - name: object_type
        in: query
        required: false
        type: string
      - name: object_number
        in: query
        required: false
        type: string
      - name: object_item_number
        in: query
        required: false
        type: string
      - name: _date_from_object_date
        in: query
        required: false
        type: string
        format: date
        description: "Orderdate from (DATE(object_date) >= value)"
      - name: _date_to_object_date
        in: query
        required: false
        type: string
        format: date
        description: "Orderdate to (DATE(object_date) <= value)"
      - name: _date_from_processingtime
        in: query
        required: false
        type: string
        format: date
        description: "Processing Timestamp from (DATE(processingtime) >= value)"
      - name: _date_to_processingtime
        in: query
        required: false
        type: string
        format: date
        description: "Processing Timestamp to (DATE(processingtime) <= value)"
    responses:
      "200":
        description: "Liste von Datensaetzen"
        schema:
          type: object
          properties:
            total:
              type: integer
            filtered:
              type: integer
            page:
              type: integer
            per_page:
              type: integer
            columns:
              type: array
              items:
                type: string
            data:
              type: array
              items:
                type: object
      "403":
        description: "Nicht autorisiert"
        schema:
          type: object
      "500":
        description: "Serverfehler"
        schema:
          type: object
    x-koha-authorization:
      permissions:
        acquisition: order_manage

